name: Deploy Insight Frontend to Server

on:
  push:
    branches:
      - develop
      - qa

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

    - name: Deploy to Dev
      if: github.ref == 'refs/heads/develop'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: dev.insight.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-insight/so360-insight-fe
        NGINX_ROOT: /var/www/dev.insight.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p $BUILD_DIR"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ root@$SERVER_IP:$BUILD_DIR/
        ssh root@$SERVER_IP "bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm ci --production=false
          export VITE_BASE_URL=https://dev.insight.skyoffice360.com/
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Deploy to Staging
      if: github.ref == 'refs/heads/qa'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: staging.insight.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-insight/so360-insight-fe
        NGINX_ROOT: /var/www/staging.insight.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p $BUILD_DIR"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ root@$SERVER_IP:$BUILD_DIR/
        ssh root@$SERVER_IP "bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm ci --production=false
          export VITE_BASE_URL=https://staging.insight.skyoffice360.com/
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Deployment Summary
      if: always()
      run: |
        echo "========================================="
        if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
          echo "Environment: Development"
          echo "Frontend: https://dev.insight.skyoffice360.com"
        elif [ "${{ github.ref }}" == "refs/heads/qa" ]; then
          echo "Environment: Staging"
          echo "Frontend: https://staging.insight.skyoffice360.com"
        fi
        echo "========================================="
